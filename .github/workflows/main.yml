name: Setup Globed Source

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone Globed source
        run: |
          git clone https://github.com/GlobedGD/globed2.git src
          cp -r src/* .

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Import Globed source"
          git push
